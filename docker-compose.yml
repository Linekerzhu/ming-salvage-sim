services:
  ming-salvage:
    build: .
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      MING_SIM_DATA_DIR: /app/data
      MING_SIM_JSON_LOGS: "1"
      MING_SIM_LOGIN_RATE_LIMIT_ATTEMPTS: "8"
      MING_SIM_LOGIN_RATE_LIMIT_WINDOW_SECONDS: "300"
      MING_SIM_MAX_RUNNING_GAMES: "64"
      MING_SIM_MAX_CONCURRENT_TURNS: "2"
    volumes:
      - ming-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8010/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  ming-data:
